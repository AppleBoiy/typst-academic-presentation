<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8f8f8" stroke="#333" stroke-width="2"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#ddd" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#ddd" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ddd" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#ddd" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#ddd" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#ddd" stroke-width="1"/>
  
  <!-- Sample graph line -->
  <polyline points="50,350 150,280 250,300 350,180 450,200 550,120 650,140 750,80" 
            fill="none" stroke="#333" stroke-width="3"/>
  
  <text x="400" y="200" font-family="Arial" font-size="24" text-anchor="middle" dominant-baseline="middle" fill="#666">
    Graph Placeholder
  </text>
  <text x="400" y="230" font-family="Arial" font-size="16" text-anchor="middle" dominant-baseline="middle" fill="#999">
    800 × 400
  </text>
</svg>
