<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fafafa" stroke="#333" stroke-width="2"/>
  
  <!-- Boxes representing a diagram -->
  <rect x="50" y="50" width="150" height="80" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <text x="125" y="90" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">Component A</text>
  
  <rect x="400" y="50" width="150" height="80" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <text x="475" y="90" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">Component B</text>
  
  <rect x="225" y="250" width="150" height="80" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <text x="300" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">Component C</text>
  
  <!-- Arrows -->
  <line x1="125" y1="130" x2="300" y2="250" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="475" y1="130" x2="300" y2="250" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <text x="300" y="380" font-family="Arial" font-size="16" text-anchor="middle" fill="#999">
    Diagram Placeholder (600 × 400)
  </text>
</svg>
